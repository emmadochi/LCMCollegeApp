<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Builder - LCM College Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body style="background:var(--body-bg);display:flex;height:100vh;overflow:hidden;">

    <aside class="adm-sidebar">
        <div class="adm-sidebar-logo"><img src="images/logo.png" alt="Logo"><span>LCM Admin</span></div>
        <nav class="adm-sidebar-nav">
            <div class="adm-nav-section">
                <span class="adm-nav-label">Overview</span>
                <a href="index.html" class="adm-nav-item"><span class="material-icons">dashboard</span> Dashboard</a>
            </div>
            <div class="adm-nav-section">
                <span class="adm-nav-label">Academics</span>
                <a href="courses.html" class="adm-nav-item"><span class="material-icons">menu_book</span> Courses</a>
                <a href="lessons.html" class="adm-nav-item"><span class="material-icons">play_lesson</span> Lessons</a>
                <a href="quizzes.html" class="adm-nav-item active"><span class="material-icons">quiz</span> Quizzes &amp; Tests</a>
                <a href="assignments.html" class="adm-nav-item"><span class="material-icons">assignment</span> Assignments</a>
            </div>
            <div class="adm-nav-section">
                <span class="adm-nav-label">Users</span>
                <a href="students.html" class="adm-nav-item"><span class="material-icons">people</span> Students</a>
                <a href="reviews.html" class="adm-nav-item"><span class="material-icons">rate_review</span> Reviews</a>
            </div>
        </nav>
        <div class="adm-sidebar-footer">
            <button id="logoutBtn" class="adm-logout-btn"><span class="material-icons">logout</span> Logout</button>
        </div>
    </aside>

    <main style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <header class="adm-header">
            <div style="display:flex;align-items:center;gap:14px;">
                <a href="quizzes.html" class="btn-icon"><span class="material-icons">arrow_back</span></a>
                <h1 class="adm-header-title">Quiz Builder</h1>
            </div>
            <div class="adm-header-right">
                <div style="display:flex;align-items:center;gap:8px;background:var(--body-bg);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;">
                    <label style="font-size:12px;font-weight:700;color:var(--text-main);">Pass Mark %</label>
                    <input type="number" id="passMark" value="70" min="0" max="100" style="width:52px;background:none;border:none;font-size:14px;font-weight:700;color:var(--brand);outline:none;text-align:center;">
                </div>
                <button type="button" id="saveQuizBtn" class="btn-primary">
                    <span class="material-icons">save</span> Save Quiz
                </button>
            </div>
        </header>

        <div style="flex:1;overflow-y:auto;padding:28px 32px;">
            <div style="max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:20px;padding-bottom:48px;">

                <!-- Meta -->
                <div class="form-section-card">
                    <div class="form-section-title">
                        <span class="material-icons" style="background:#ede9fe;color:var(--brand);">info</span>
                        Quiz Details
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div>
                            <label class="form-label">Associated Course</label>
                            <select id="courseSelect" class="form-input">
                                <option value="">Select Course</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Target Lesson</label>
                            <select id="lessonSelect" class="form-input">
                                <option value="">Select Lesson (choose course first)</option>
                            </select>
                            <p style="font-size:12px;color:var(--text-muted);margin-top:5px;">Students must pass this to complete the lesson.</p>
                        </div>
                    </div>
                </div>

                <!-- Questions Container -->
                <div id="questionsContainer" style="display:flex;flex-direction:column;gap:16px;">
                    <!-- Injected by quizzes.js -->
                </div>

                <!-- Add Question CTA -->
                <button id="addQuestionBtn" style="width:100%;padding:22px;border:2px dashed var(--border);border-radius:var(--radius-md);background:var(--card-bg);color:var(--text-muted);font-size:13.5px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:var(--transition);"
                    onmouseover="this.style.borderColor='var(--brand)';this.style.color='var(--brand)';this.style.background='#f5f3ff';"
                    onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)';this.style.background='var(--card-bg)';">
                    <span class="material-icons" style="font-size:28px;">add_circle_outline</span>
                    Add Question
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/quizzes.js"></script>
</body>
</html>
